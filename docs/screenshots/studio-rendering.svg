<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Synapse Studio  rendu G-DNN et L-DNN">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#2d1f3d"/>
    </linearGradient>
    <radialGradient id="gi" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffd580" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd580" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sdf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect width="1280" height="720" fill="url(#gi)"/>

  <!-- Ground with GI -->
  <polygon points="0,520 1280,520 1280,720 0,720" fill="#1c2333"/>
  <polygon points="0,520 1280,520 1280,540 0,540" fill="#ffd580" opacity="0.08"/>

  <!-- Neural SDF object (G-DNN ray marched) -->
  <path d="M 540 380 Q 590 280 640 380 Q 690 480 590 520 Q 490 480 540 380 Z" fill="url(#sdf)" opacity="0.85"/>
  <path d="M 560 400 Q 590 340 620 400 Q 650 460 590 490 Q 530 460 560 400 Z" fill="#ffffff" opacity="0.12"/>

  <!-- SSAO shadow -->
  <ellipse cx="590" cy="530" rx="100" ry="15" fill="#000000" opacity="0.3"/>

  <!-- Neural fog (L-DNN froxel) -->
  <rect x="0" y="0" width="1280" height="720" fill="#a371f7" opacity="0.05"/>

  <!-- Labels -->
  <rect x="24" y="24" width="320" height="80" rx="8" fill="#0d1117" opacity="0.85"/>
  <text x="40" y="48" fill="#c9d1d9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Rendu temps rťel</text>
  <text x="40" y="68" fill="#58a6ff" font-family="Inter, system-ui, sans-serif" font-size="11">G-DNN : SDF neural + ray marching</text>
  <text x="40" y="84" fill="#a371f7" font-family="Inter, system-ui, sans-serif" font-size="11">L-DNN : GI hybride + SSAO + brouillard</text>
  <text x="40" y="100" fill="#3fb950" font-family="Inter, system-ui, sans-serif" font-size="11">Preset : Full  60 IPS</text>
</svg>
