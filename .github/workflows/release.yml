name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Synapse-win-x64
          - os: windows-latest
            rid: win-arm64
            artifact: Synapse-win-arm64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Synapse-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: Synapse-linux-arm64
          - os: macos-latest
            rid: osx-arm64
            artifact: Synapse-osx-arm64
          - os: macos-13
            rid: osx-x64
            artifact: Synapse-osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Studio
        run: >
          dotnet publish src/Synapse.Studio/Synapse.Studio.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishReadyToRun=true
          -o artifacts/${{ matrix.artifact }}

      - name: Stage notes (Windows)
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: |
          Copy-Item README.md, LICENSE, COPYRIGHT, docs/REQUIREMENTS.md artifacts/${{ matrix.artifact }}/
          @"
          SYNAPSE OMNIA — Outil de simulation 3D (${{ matrix.rid }})
          MIT License — open source. See LICENSE, COPYRIGHT, REQUIREMENTS.md.
          Minimum: mid-range CPU (AVX2/NEON baseline, AVX-512 optional) + Vulkan 1.1+ GPU + GLFW.
          Launch: Synapse.Studio.exe | Engine: Synapse.Studio.exe --engine
          "@ | Set-Content artifacts/${{ matrix.artifact }}/RELEASE_NOTES.txt

      - name: Stage notes (Unix)
        if: ${{ !startsWith(matrix.rid, 'win-') }}
        run: |
          cp README.md LICENSE COPYRIGHT docs/REQUIREMENTS.md "artifacts/${{ matrix.artifact }}/"
          cat > "artifacts/${{ matrix.artifact }}/RELEASE_NOTES.txt" <<'EOF'
          SYNAPSE OMNIA — Outil de simulation 3D
          RID: see folder name. See REQUIREMENTS.md for minimum hardware.
          Needs: Vulkan 1.1+ (MoltenVK on macOS) + GLFW. AVX-512 not required.
          Launch: ./Synapse.Studio | Engine: ./Synapse.Studio --engine
          EOF

      - name: Zip (Windows)
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.artifact }}/* -DestinationPath artifacts/${{ matrix.artifact }}.zip -Force

      - name: Tar (Unix)
        if: ${{ !startsWith(matrix.rid, 'win-') }}
        run: tar -C artifacts -czf "artifacts/${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            artifacts/${{ matrix.artifact }}.zip
            artifacts/${{ matrix.artifact }}.tar.gz

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
          generate_release_notes: true
          body: |
            ## SYNAPSE OMNIA ${{ github.ref_name }}

            Moteur de **simulation 3D** multiplateforme (GLFW + Vulkan).

            ### Artefacts
            - **Windows x64** — `.zip` self-contained
            - **Linux x64** — `.tar.gz` self-contained
            - **macOS arm64** — `.tar.gz` (MoltenVK)

            ### Launch
            - Studio Avalonia : `Synapse.Studio` / `Synapse.Studio.exe`
            - Moteur GLFW seul : `--engine`
