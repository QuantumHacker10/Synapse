name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Synapse-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Synapse-linux-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: Synapse-osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Studio
        run: >
          dotnet publish src/Synapse.Studio/Synapse.Studio.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishReadyToRun=true
          -o artifacts/${{ matrix.artifact }}

      - name: Stage notes (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          Copy-Item README.md, LICENSE, COPYRIGHT artifacts/${{ matrix.artifact }}/
          @"
          SYNAPSE OMNIA — 3D Simulation Engine (Windows x64) — ${{ github.ref_name }}
          Proprietary license — see LICENSE / COPYRIGHT.
          Prerequisites: Vulkan GPU drivers. Place glfw3.dll beside the exe if needed
          (src/Synapse.Studio/native/README.md).
          Launch: Synapse.Studio.exe | Engine: Synapse.Studio.exe --engine
          "@ | Set-Content artifacts/${{ matrix.artifact }}/RELEASE_NOTES.txt

      - name: Stage notes (Unix)
        if: matrix.rid != 'win-x64'
        run: |
          cp README.md LICENSE COPYRIGHT "artifacts/${{ matrix.artifact }}/"
          cat > "artifacts/${{ matrix.artifact }}/RELEASE_NOTES.txt" <<EOF
          SYNAPSE OMNIA — 3D Simulation Engine — ${{ github.ref_name }}
          RID: see folder name. Proprietary — see LICENSE / COPYRIGHT.
          Needs: Vulkan (MoltenVK on macOS) + GLFW (system package or runtimes/*/native).
          Launch: ./Synapse.Studio | Engine: ./Synapse.Studio --engine
          EOF

      - name: Zip (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.artifact }}/* -DestinationPath artifacts/${{ matrix.artifact }}.zip -Force

      - name: Tar (Unix)
        if: matrix.rid != 'win-x64'
        run: tar -C artifacts -czf "artifacts/${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            artifacts/${{ matrix.artifact }}.zip
            artifacts/${{ matrix.artifact }}.tar.gz

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
          generate_release_notes: true
          body: |
            ## SYNAPSE OMNIA ${{ github.ref_name }}

            Cross-platform **3D simulation engine** (GLFW + Vulkan).

            ### Artifacts
            - **Windows x64** — `.zip` self-contained
            - **Linux x64** — `.tar.gz` self-contained
            - **macOS arm64** — `.tar.gz` (MoltenVK)

            ### Launch
            - Synapse Studio (Avalonia): `Synapse.Studio` / `Synapse.Studio.exe`
            - Engine-only GLFW mode: `--engine`

            ### Documentation
            - [Getting started](../blob/main/docs/getting-started.md)
            - [Architecture](../blob/main/docs/architecture.md)
