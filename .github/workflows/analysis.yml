name: Code Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Run analyzers
      run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=false /p:RunAnalyzers=true /p:RunAnalyzersDuringBuild=true

    - name: Check formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic
