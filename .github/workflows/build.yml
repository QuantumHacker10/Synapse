name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Synapse.slnx

    - name: Build
      run: dotnet build Synapse.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test Synapse.slnx --no-build --configuration Release --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage"

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: '**/coverage.cobertura.xml'

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        files: '**/coverage.cobertura.xml'
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Audit NuGet vulnerabilities
      run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt; if grep -q "has the following vulnerable" vulnerability-report.txt; then echo "::warning::Vulnerable packages detected — see vulnerability-report.txt"; fi

  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Synapse.slnx

    - name: Build
      run: dotnet build Synapse.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test Synapse.slnx --no-build --configuration Release --verbosity normal

  publish-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Studio
      run: dotnet build src/Synapse.Studio/Synapse.Studio.csproj -c Release

    - name: Publish win-x64
      run: >
        dotnet publish src/Synapse.Studio/Synapse.Studio.csproj
        -c Release -r win-x64 --self-contained true
        -o artifacts/Synapse-win-x64

    - name: Upload publish artifact
      uses: actions/upload-artifact@v4
      with:
        name: synapse-win-x64
        path: artifacts/Synapse-win-x64

  publish-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish linux-x64
      run: >
        dotnet publish src/Synapse.Studio/Synapse.Studio.csproj
        -c Release -r linux-x64 --self-contained true
        -o artifacts/Synapse-linux-x64

    - name: Upload publish artifact
      uses: actions/upload-artifact@v4
      with:
        name: synapse-linux-x64
        path: artifacts/Synapse-linux-x64

  industrial-certification:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Run industrial physics certification
      run: >
        dotnet test tests/Synapse.Tests/Synapse.Tests.csproj
        -c Release
        --filter "FullyQualifiedName~PhysicsCertification|FullyQualifiedName~Ccd|FullyQualifiedName~JointAndVehicle|FullyQualifiedName~MeshProvider|FullyQualifiedName~SoftConstraint|FullyQualifiedName~IndustrialHardening|FullyQualifiedName~DxcCompilation|FullyQualifiedName~GpuResident"
        --verbosity normal
