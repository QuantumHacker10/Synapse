name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Synapse.slnx

    - name: Build
      run: dotnet build Synapse.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test Synapse.slnx --no-build --configuration Release --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage"

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: '**/coverage.cobertura.xml'

    - name: Upload to Codecov
      uses: codecov/codecov-action@v7
      if: always()
      with:
        files: '**/coverage.cobertura.xml'
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Audit NuGet vulnerabilities
      run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt; if grep -q "has the following vulnerable" vulnerability-report.txt; then echo "::warning::Vulnerable packages detected — see vulnerability-report.txt"; fi

  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Synapse.slnx

    - name: Build
      run: dotnet build Synapse.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test Synapse.slnx --no-build --configuration Release --verbosity normal

  publish-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-13
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Studio (${{ matrix.rid }})
      run: >
        dotnet publish src/Synapse.Studio/Synapse.Studio.csproj
        -c Release -r ${{ matrix.rid }} --self-contained true
        -p:PublishReadyToRun=true
        -o artifacts/Synapse-${{ matrix.rid }}

    - name: Smoke entrypoint exists
      shell: bash
      run: |
        set -euo pipefail
        dest="artifacts/Synapse-${{ matrix.rid }}"
        if [[ -f "$dest/Synapse.Studio.exe" || -f "$dest/Synapse.Studio" ]]; then
          echo "OK entrypoint for ${{ matrix.rid }}"
          # Copy requirements for artifact consumers
          cp -f docs/REQUIREMENTS.md "$dest/" 2>/dev/null || true
        else
          echo "Missing Synapse.Studio entrypoint for ${{ matrix.rid }}"
          ls -la "$dest" || true
          exit 1
        fi

    - name: Upload publish artifact
      uses: actions/upload-artifact@v4
      with:
        name: synapse-${{ matrix.rid }}
        path: artifacts/Synapse-${{ matrix.rid }}

  industrial-certification:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Run industrial physics certification
      run: >
        dotnet test tests/Synapse.Tests/Synapse.Tests.csproj
        -c Release
        --filter "FullyQualifiedName~PhysicsCertification|FullyQualifiedName~Ccd|FullyQualifiedName~JointAndVehicle|FullyQualifiedName~MeshProvider|FullyQualifiedName~SoftConstraint|FullyQualifiedName~IndustrialHardening|FullyQualifiedName~DxcCompilation|FullyQualifiedName~GpuResident"
        --verbosity normal
