version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
      test-packages:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
