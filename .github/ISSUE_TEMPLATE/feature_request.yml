---
name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are trying to solve and how Synapse could help.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: I want to evolve SDF shapes with custom fitness metrics during live simulation…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add a fitness hook in NeatGEvolutionEngine that reads L-DNN irradiance…
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Primary module
      options:
        - Core
        - Physics
        - AI / NEAT-G
        - Genomics
        - Rendering (G-DNN / L-DNN)
        - LLM
        - Simulation / Sentience
        - Runtime
        - Studio
        - Infrastructure / CI
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this feature
          required: false
