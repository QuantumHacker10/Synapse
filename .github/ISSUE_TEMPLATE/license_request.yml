---
name: License request
description: Request permission for commercial, academic, or derivative use
title: "[License]: "
labels: ["license"]
body:
  - type: markdown
    attributes:
      value: |
        Synapse OMNIA is proprietary software. Academic and personal evaluation is permitted
        without a separate agreement (see [LICENSE](../LICENSE)). Use this template for
        commercial integration, redistribution, or derivative works.

  - type: dropdown
    id: use_case
    attributes:
      label: Requested use
      options:
        - Commercial product integration
        - Paid training / consulting
        - Fork or mirror (public or private)
        - Academic research with redistribution
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Describe your intended use
      placeholder: We would like to embed Synapse Runtime in an internal simulation tool…
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: Contact email (optional)
      placeholder: you@organization.edu
