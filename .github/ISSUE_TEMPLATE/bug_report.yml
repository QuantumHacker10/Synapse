name: Bug Report
description: Signaler un bug ou comportement inattendu
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de signaler un bug. Vérifiez d'abord les [issues existantes](https://github.com/QuantumHacker10/Synapse/issues).

  - type: dropdown
    id: component
    attributes:
      label: Composant affecté
      options:
        - Synapse Studio (UI)
        - Rendu Vulkan (G-DNN / L-DNN)
        - Physique (living laws / rigid bodies)
        - Simulation (entités / behavior trees)
        - LLM (HybridLlmRouter)
        - CI / Build
        - Documentation
        - Autre
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Que s'est-il passé ? Que devait-il se passer ?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes de reproduction
      description: Commandes, scène `.synapse`, actions dans Studio
      placeholder: |
        1. dotnet run --project src/Synapse.Studio -- --scene samples/demo.synapse
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version Synapse
      placeholder: "1.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Système d'exploitation
      options:
        - Windows x64
        - Linux x64
        - macOS arm64
        - Autre
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: Version .NET SDK
      placeholder: "10.0.300"

  - type: textarea
    id: logs
    attributes:
      label: Logs / messages d'erreur
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: J'ai cherché dans les issues existantes
          required: true
        - label: J'ai testé sur la dernière version (main ou dernière release)
          required: true
